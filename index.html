<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Surprise</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at center,#1a0033,#000);
font-family:'Segoe UI',sans-serif;
color:white;
text-align:center;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* PALACE BACKGROUND */
.palace{
position:fixed;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(to top,#000,transparent),
url('https://i.imgur.com/6Iej2c3.png');
background-size:cover;
background-position:center;
opacity:0.3;
z-index:0;
}

/* FLOATING PHOTOS */
.floating-photo{
position:fixed;
width:160px;
border-radius:20px;
box-shadow:0 0 25px gold;
animation:floatPhoto 6s ease-in-out infinite;
z-index:2;
}

@keyframes floatPhoto{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
}

/* BALLOONS */
.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:60px;
background:radial-gradient(circle at 30% 30%, #ff66cc, #cc00ff);
border-radius:50%;
animation:rise linear infinite;
z-index:1;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}

/* CORONATION TEXT */
.coronation-text{
font-size:45px;
color:gold;
text-shadow:0 0 20px gold,0 0 40px orange;
animation:glowPulse 2s infinite;
}

@keyframes glowPulse{
0%,100%{text-shadow:0 0 20px gold;}
50%{text-shadow:0 0 50px orange,0 0 100px gold;}
}

/* CROWN DROP */
.crown{
position:absolute;
top:-100px;
font-size:60px;
animation:drop 2s forwards;
}

@keyframes drop{
to{top:20px;}
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="palace"></div>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
<h1>Tap To Start The Magic ✨</h1>
<button onclick="startExperience()">Start</button>
</div>

<!-- QUOTES -->
<div id="quoteScreen" class="screen">
<h1 id="quoteText"></h1>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<h1>Catch 10 Hearts ❤️</h1>
<p>Tap them fast!</p>
<div id="score">0</div>
</div>

<!-- WISH -->
<div id="wishScreen" class="screen">
<h1>Close Your Eyes… ✨</h1>
<h2>Make A Wish 💫</h2>
<button onclick="blowCandle()">Blow Candle 🕯</button>
</div>

<!-- FINAL -->
<div id="finalScreen" class="screen">
<div class="crown">👑</div>
<h1 class="coronation-text">Queen Of My Heart</h1>
<h2>Forever & Always 💖</h2>
</div>

<audio id="bgMusic" src="perfect.mp3"></audio>

<script>

const quotes=[
"You are my destiny ❤️",
"You are my happiest moment ✨",
"You are my dream come true 💫",
"My forever person 💖",
"My Queen 👑"
];

let quoteIndex=0;

function startExperience(){
document.getElementById("bgMusic").play();
createFloatingPhotos();
createBalloons();
showScreen("quoteScreen");
showQuotes();
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function showQuotes(){
if(quoteIndex<quotes.length){
document.getElementById("quoteText").innerText=quotes[quoteIndex];
quoteIndex++;
setTimeout(showQuotes,3000);
}else{
startGame();
}
}

/* GAME */
let score=0;

function startGame(){
showScreen("gameScreen");
spawnHeart();
}

function spawnHeart(){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*90+"%";
heart.style.top=Math.random()*90+"%";
heart.style.fontSize="30px";
heart.style.cursor="pointer";

heart.onclick=function(){
score++;
document.getElementById("score").innerText=score;
heart.remove();
if(score>=10){
showWish();
}else{
spawnHeart();
}
};

document.body.appendChild(heart);
setTimeout(()=>heart.remove(),2000);
}

function showWish(){
showScreen("wishScreen");
}

function blowCandle(){
royalCelebration();
}

/* FINAL */
function royalCelebration(){
showScreen("finalScreen");
bollywoodFireworks();
}

function bollywoodFireworks(){
for(let i=0;i<400;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"%";
confetti.style.background=["gold","#ffcc00","#ff0066","#66ccff","#ffffff"][Math.floor(Math.random()*5)];
document.body.appendChild(confetti);
}
}

/* PHOTOS */
function createFloatingPhotos(){
const photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
const positions=[
{top:"10%",left:"5%"},
{top:"20%",right:"5%"},
{top:"65%",left:"8%"},
{top:"70%",right:"8%"},
{top:"40%",left:"3%"}
];

photos.forEach((src,i)=>{
let img=document.createElement("img");
img.src=src;
img.className="floating-photo";
img.style.top=positions[i].top;
if(positions[i].left) img.style.left=positions[i].left;
if(positions[i].right) img.style.right=positions[i].right;
document.body.appendChild(img);
});
}

/* BALLOONS */
function createBalloons(){
for(let i=0;i<50;i++){
let balloon=document.createElement("div");
balloon.className="balloon";
balloon.style.left=Math.random()*100+"%";
balloon.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(balloon);
}
}

</script>

</body>
</html>
