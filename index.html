<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Romantic Night</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at top, #4b0082 0%, #2b004f 40%, #140022 75%, #000000 100%);
color:#f3d9ff;
transition:opacity 2.5s ease-in-out;
box-shadow: inset 0 0 200px rgba(255, 105, 180, 0.15);
text-align:center;
}

/* ⭐ Moving Stars */
.stars {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
animation:moveStars 60s linear infinite;
opacity:0.35;
z-index:-3;
}
@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* 🌫 Mist */
.mist{
position:fixed;
bottom:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at bottom,
rgba(255,105,180,0.15),
transparent 70%);
pointer-events:none;
z-index:-2;
}

/* 👑 Golden Frame */
body::after{
content:"";
position:fixed;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:3px solid gold;
box-shadow:0 0 25px gold, 0 0 60px rgba(255,215,0,0.5);
pointer-events:none;
z-index:9999;
border-radius:15px;
}

/* Headings */
h1,h2,h3{
color:#f8d6ff;
text-shadow:
0 0 8px rgba(255,255,255,0.8),
0 0 18px rgba(255,105,180,0.6),
0 0 35px rgba(204,153,255,0.5);
letter-spacing:2px;
}

/* Start Button */
button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:gold;
color:black;
cursor:pointer;
box-shadow:0 0 20px gold;
transition:0.3s;
}
button:hover{
transform:scale(1.1);
}

/* Floating Hearts */
.love{
position:fixed;
font-size:20px;
animation:floatUp 6s linear infinite;
opacity:0.6;
pointer-events:none;
}
@keyframes floatUp{
0%{transform:translateY(100vh); opacity:0;}
20%{opacity:0.8;}
100%{transform:translateY(-10vh); opacity:0;}
}

/* Canvas Glow */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
filter: drop-shadow(0 0 20px #ff66cc);
}

#mainContent{
display:none;
margin-top:20vh;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="mist"></div>

<audio id="bgMusic" src="yourmusic.mp3" loop></audio>

<div id="startScreen" style="margin-top:30vh;">
<h1>Tonight Is Special ✨</h1>
<button onclick="startExperience()">Start</button>
</div>

<div id="mainContent">
<h1>Ansar 💜</h1>
<h2>You are my destiny...</h2>
</div>

<canvas id="fireworks"></canvas>

<script>

/* 🎵 Start Experience */
function startExperience(){
document.getElementById("startScreen").style.display="none";
document.getElementById("mainContent").style.display="block";

let audio=document.getElementById("bgMusic");
audio.volume=0;
audio.play();

let fade=setInterval(()=>{
if(audio.volume<0.5){
audio.volume+=0.02;
}else{
clearInterval(fade);
}
},200);

setTimeout(()=>{
alert("Close your eyes... and make a wish ✨👑");
},2000);

startHearts();
startFireworks();
}

/* 💖 Floating Hearts */
function startHearts(){
setInterval(()=>{
const love=document.createElement("div");
love.className="love";
love.innerHTML="❤";
love.style.left=Math.random()*100+"vw";
love.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(love);
setTimeout(()=>{love.remove();},7000);
},800);
}

/* 🎆 Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;
for(let i=0;i<50;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5,
life:100
});
}
}

function animateFireworks(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;
ctx.fillStyle="pink";
ctx.fillRect(p.x,p.y,3,3);
if(p.life<=0)particles.splice(i,1);
});
requestAnimationFrame(animateFireworks);
}

function startFireworks(){
setInterval(createFirework,2000);
animateFireworks();
}

</script>

</body>
</html>
