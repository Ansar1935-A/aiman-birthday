<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Surprise</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at center,#1a0033,#000);
font-family:Segoe UI, sans-serif;
color:white;
text-align:center;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5;
padding:20px;
}

.active{
display:flex;
animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* PALACE */
.palace{
position:fixed;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(to top,#000,transparent),
radial-gradient(circle at center,#330066,#000);
opacity:0.4;
z-index:0;
}

/* FLOATING PHOTOS */
.floating-photo{
position:fixed;
width:150px;
border-radius:20px;
box-shadow:0 0 20px gold;
animation:float 6s ease-in-out infinite;
z-index:1;
opacity:0.9;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* BALLOONS */
.balloon{
position:fixed;
bottom:-80px;
width:35px;
height:50px;
background:radial-gradient(circle at 30% 30%,#ff66cc,#cc00ff);
border-radius:50%;
animation:rise linear infinite;
z-index:0;
}

@keyframes rise{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

/* CORONATION */
.coronation{
font-size:42px;
color:gold;
text-shadow:0 0 15px gold,0 0 30px orange;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{text-shadow:0 0 15px gold}
50%{text-shadow:0 0 40px orange,0 0 80px gold}
}

/* FIREWORK PARTICLE */
.spark{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s linear forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

</style>
</head>

<body>

<div class="palace"></div>

<!-- START -->
<div id="start" class="screen active">
<h1>Tap To Start The Magic ✨</h1>
<button onclick="startExperience()">Start</button>
</div>

<!-- QUOTES -->
<div id="quotes" class="screen">
<h1 id="quoteText"></h1>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h1>Catch 10 Hearts ❤️</h1>
<div id="score">0</div>
</div>

<!-- WISH -->
<div id="wish" class="screen">
<h1>Close Your Eyes…</h1>
<h2>Make A Wish 💫</h2>
<button onclick="blowCandle()">Blow Candle 🕯</button>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<h1 class="coronation">Queen Of My Heart 👑</h1>
<h2>Forever & Always 💖</h2>
</div>

<audio id="music" src="perfect.mp3"></audio>

<script>

/* SCREEN CONTROL */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* START */
function startExperience(){
document.getElementById("music").play().catch(()=>{});
createPhotos();
createBalloons();
show("quotes");
showQuotes();
}

/* QUOTES */
const quotes=[
"You are my destiny ❤️",
"You are my happiest moment ✨",
"You are my dream come true 💫",
"My forever person 💖",
"My Queen 👑"
];

let q=0;

function showQuotes(){
if(q<quotes.length){
document.getElementById("quoteText").innerText=quotes[q];
q++;
setTimeout(showQuotes,3000);
}else{
startGame();
}
}

/* GAME */
let score=0;
let gameActive=true;

function startGame(){
show("game");
score=0;
document.getElementById("score").innerText=score;
gameActive=true;
spawnHeart();
}

function spawnHeart(){
if(!gameActive) return;

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*80+"%";
heart.style.top=Math.random()*80+"%";
heart.style.fontSize="30px";
heart.style.cursor="pointer";
heart.style.zIndex="10";

heart.onclick=function(){
score++;
document.getElementById("score").innerText=score;
heart.remove();
if(score>=10){
gameActive=false;
show("wish");
}else{
spawnHeart();
}
};

document.body.appendChild(heart);

setTimeout(()=>{
if(document.body.contains(heart)) heart.remove();
},2000);
}

/* WISH */
function blowCandle(){
royalCelebration();
}

/* FINAL */
function royalCelebration(){
show("final");
bollywoodFireworks();
}

/* FIREWORKS */
function bollywoodFireworks(){

for(let i=0;i<200;i++){
let spark=document.createElement("div");
spark.className="spark";
spark.style.background=["gold","#ffcc00","#ff0066","#66ccff","#ffffff"][Math.floor(Math.random()*5)];

let angle=Math.random()*2*Math.PI;
let distance=150+Math.random()*200;

spark.style.left="50%";
spark.style.top="50%";
spark.style.setProperty('--x',Math.cos(angle)*distance+"px");
spark.style.setProperty('--y',Math.sin(angle)*distance+"px");

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1200);
}

}

/* PHOTOS */
function createPhotos(){

const photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
const positions=[
{top:"10%",left:"5%"},
{top:"15%",right:"5%"},
{top:"65%",left:"8%"},
{top:"70%",right:"8%"},
{top:"40%",left:"3%"}
];

photos.forEach((src,i)=>{
let img=document.createElement("img");
img.src=src;
img.className="floating-photo";
img.style.top=positions[i].top;
if(positions[i].left) img.style.left=positions[i].left;
if(positions[i].right) img.style.right=positions[i].right;
document.body.appendChild(img);
});
}

/* BALLOONS */
function createBalloons(){
for(let i=0;i<40;i++){
let balloon=document.createElement("div");
balloon.className="balloon";
balloon.style.left=Math.random()*100+"%";
balloon.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(balloon);
}
}

</script>

</body>
</html>
